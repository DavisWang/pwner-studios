<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 654" role="img" aria-labelledby="title desc">
  <title id="title">Diggr title card</title>
  <desc id="desc">A Diggr title screen with the game logo, left-side menu buttons, and a mine preview panel on the right.</desc>
  <defs>
    <linearGradient id="button-fill" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#314062" />
      <stop offset="100%" stop-color="#1d2945" />
    </linearGradient>
    <linearGradient id="panel-fill" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#1c2942" />
      <stop offset="100%" stop-color="#152139" />
    </linearGradient>
    <linearGradient id="ground-fill" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#b97839" />
      <stop offset="100%" stop-color="#b17235" />
    </linearGradient>
    <filter id="logo-shadow" x="-30%" y="-40%" width="160%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="0" flood-color="#2c160d" flood-opacity="1" />
      <feDropShadow dx="0" dy="14" stdDeviation="0" flood-color="#120907" flood-opacity="0.9" />
    </filter>
  </defs>

  <rect width="960" height="654" fill="#060a14" />
  <rect x="2" y="2" width="956" height="650" fill="none" stroke="#e9dfba" stroke-width="4" />

  <g fill="#1e2432" opacity="0.65">
    <rect x="0" y="571" width="360" height="10" />
    <rect x="0" y="611" width="360" height="43" />
    <rect x="594" y="611" width="366" height="43" />
  </g>

  <g fill="#11182a">
    <circle cx="48" cy="33" r="2" />
    <circle cx="180" cy="92" r="1.8" />
    <circle cx="228" cy="48" r="1.5" />
    <circle cx="596" cy="86" r="1.4" />
    <circle cx="657" cy="132" r="1.6" />
    <circle cx="806" cy="145" r="1.4" />
    <circle cx="874" cy="118" r="1.8" />
    <circle cx="136" cy="222" r="1.3" />
    <circle cx="281" cy="189" r="1.4" />
    <circle cx="426" cy="231" r="1.6" />
    <circle cx="907" cy="378" r="1.5" />
    <circle cx="827" cy="502" r="1.7" />
