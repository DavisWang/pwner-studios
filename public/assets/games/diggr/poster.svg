      <rect x="840" y="300" width="5" height="5" fill="#ffe08a" />
      <rect x="859" y="312" width="6" height="4" fill="#ff914c" />
      <rect x="835" y="322" width="26" height="8" fill="#ff9b42" />
      <rect x="841" y="339" width="26" height="9" fill="#d49322" />
      <rect x="832" y="349" width="43" height="8" fill="#f6cf54" />
      <rect x="839" y="357" width="29" height="7" fill="#ffe690" />
