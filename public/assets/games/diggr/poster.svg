      <rect x="769" y="513" width="28" height="28" fill="#7b4b24" />
      <rect x="774" y="518" width="5" height="17" fill="#90d8ff" />
      <rect x="781" y="521" width="5" height="14" fill="#68bff2" />
      <rect x="788" y="516" width="5" height="18" fill="#a5e5ff" />
