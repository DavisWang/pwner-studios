  <g filter="url(#logo-shadow)">
    <rect x="237" y="36" width="482" height="88" fill="#26160f" />
    <text x="258" y="111" fill="#2e190f" font-family="monospace" font-size="92" font-weight="700" letter-spacing="5">DIGGR</text>
    <text x="249" y="102" fill="#f7e39e" font-family="monospace" font-size="92" font-weight="700" letter-spacing="5">DIGGR</text>
  </g>

  <g fill="#d8dced" font-family="monospace" font-size="22">
    <text x="54" y="182">Dig through a shifting mine, cash out at</text>
    <text x="54" y="220">the surface, and keep the rig alive long</text>
    <text x="88" y="258">enough to reach the rarest veins.</text>
  </g>

  <g font-family="monospace" font-size="25" letter-spacing="3">
    <g>
      <rect x="58" y="296" width="394" height="70" fill="url(#button-fill)" stroke="#efe1b5" stroke-width="4" />
      <text x="211" y="340" fill="#efe1b5">NEW GAME</text>
    </g>
    <g>
      <rect x="58" y="389" width="394" height="70" fill="url(#button-fill)" stroke="#efe1b5" stroke-width="4" />
      <text x="188" y="433" fill="#efe1b5">TESTING MODE</text>
    </g>
    <g>
      <rect x="58" y="482" width="394" height="70" fill="url(#button-fill)" stroke="#efe1b5" stroke-width="4" />
      <text x="205" y="526" fill="#efe1b5">LOAD GAME</text>
    </g>
