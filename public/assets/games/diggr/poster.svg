      <rect x="653" y="516" width="6" height="20" fill="#b8c7db" />
      <rect x="667" y="516" width="6" height="20" fill="#a5d7ff" />
      <rect x="661" y="522" width="4" height="13" fill="#efe1b5" />
    </g>
    <g>
      <rect x="703" y="507" width="40" height="40" fill="#2e180d" />
      <rect x="709" y="513" width="28" height="28" fill="#7b4b24" />
      <rect x="713" y="520" width="7" height="7" fill="#f4d34f" />
      <rect x="722" y="517" width="7" height="7" fill="#e7ba3c" />
      <rect x="713" y="529" width="7" height="7" fill="#d9ad29" />
      <rect x="723" y="529" width="7" height="7" fill="#f6df7e" />
